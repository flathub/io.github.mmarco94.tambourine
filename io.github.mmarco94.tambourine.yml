app-id: io.github.mmarco94.tambourine
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: run.sh
finish-args:
  - --filesystem=xdg-music:ro
  - --socket=x11
  - --socket=pulseaudio
  - --share=ipc
  - --device=dri
modules:
  - name: tambourine
    buildsystem: simple
    build-commands:
      # Installing the actual app
      - tar -xzf tambourine.tar.gz -C /app/
      - install -D run.sh /app/bin/run.sh
      # ffsampledsp requires libbz2.so.1.0, however Flatpak only provides libbz2.so.1.0.8
      - mkdir -p /app/lib/ffmpeg
      - mkdir -p /app/tambourine/lib/os
      - ln -s /usr/lib/x86_64-linux-gnu/libbz2.so.1.0.8 /app/tambourine/lib/os/libbz2.so.1.0
      # running the app to create the SharedArchiveFile
      - touch -d "1970-01-01T00:00:00Z" /app/tambourine/lib/app/tambourine-*.jar # setting a stable timestamp on the JAR
      - cp /app/tambourine/lib/app/tambourine.cfg /app/tambourine/lib/app/tambourine.cfg.bkp
      - echo "java-options=-Xshare:dump" >> /app/tambourine/lib/app/tambourine.cfg
      - echo "java-options=-XX:SharedClassListFile=tambourine.classlist" >> /app/tambourine/lib/app/tambourine.cfg
      - echo "java-options=-XX:SharedArchiveFile=/app/tambourine/lib/app/resources/tambourine.jsa" >> /app/tambourine/lib/app/tambourine.cfg
      - /app/tambourine/bin/tambourine
      # restoring original config and add class archive
      - mv /app/tambourine/lib/app/tambourine.cfg.bkp /app/tambourine/lib/app/tambourine.cfg
      - echo "java-options=-XX:SharedArchiveFile=/app/tambourine/lib/app/resources/tambourine.jsa" >> /app/tambourine/lib/app/tambourine.cfg
    sources:
      - type: file
        url: https://github.com/MMarco94/tambourine-music-player/releases/download/v1.5.3/tambourine-amd64.tar.gz
        sha256: 2e4ae5edb30744f1864cd73d6cef8b13b53dfec0a74726a80a1bf841c00e1911
        dest-filename: tambourine.tar.gz
        only-arches:
          - x86_64
      - type: file
        url: https://github.com/MMarco94/tambourine-music-player/releases/download/v1.5.3/tambourine-arm64.tar.gz
        sha256: 10de40f38207f9cd67cb1a4b47544df189d8477bf685e83917f52ae4d3eb496a
        dest-filename: tambourine.tar.gz
        only-arches:
          - aarch64
      - type: file
        path: run.sh
      - type: file
        path: tambourine.classlist
  - name: extras
    buildsystem: simple
    build-commands:
      - install -D io.github.mmarco94.tambourine.desktop /app/share/applications/io.github.mmarco94.tambourine.desktop
      - install -D io.github.mmarco94.tambourine.metainfo.xml /app/share/metainfo/io.github.mmarco94.tambourine.metainfo.xml
      - install -D icon.svg /app/share/icons/hicolor/scalable/apps/io.github.mmarco94.tambourine.svg
      - install -D icon-symbolic.svg /app/share/icons/hicolor/scalable/apps/io.github.mmarco94.tambourine-symbolic.svg
    sources:
      - type: file
        url: https://raw.githubusercontent.com/MMarco94/tambourine-music-player/0f39f3714563fc4b8f5c7d0092a7932d0c0ebd8f/flatpak/io.github.mmarco94.tambourine.desktop
        sha256: bba9ef732d0db2eb0339bc086dd54e24eb43f8c282ee85c5f0c999eb2fa2c724
      - type: file
        path: io.github.mmarco94.tambourine.metainfo.xml
      - type: file
        url: https://raw.githubusercontent.com/MMarco94/tambourine-music-player/b203c33026f03cbc3b747f336bc0e80fbcc5aaab/flatpak/icon.svg
        sha256: f01cbd03ec5d977df2ebf83da5775f7df64c58593b8ff62f98abb410b9c6fa84
      - type: file
        url: https://raw.githubusercontent.com/MMarco94/tambourine-music-player/b4ee0d5183660981238a9b7df4d558e5b3af8320/flatpak/icon-symbolic.svg
        sha256: 2d7f133bef68f50abda81a66a6e1a3d49c67319030a5a5018179edf4e1af6174
